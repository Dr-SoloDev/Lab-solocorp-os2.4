# AO CLI Bridge Configuration
# SoloCorp OS — Agent Orchestrator Integration
# version: 0.1.1 | 2026-07-20

[ao]
# Bridge polling is off by default; health still requires a resolvable CLI.
enabled = false
# Prefer repo stub (works when CWD is repo root). Override with AO_CLI_PATH
# or install entry point so bare "agent_orchestrator" is on PATH.
cli_path = "scripts/agent_orchestrator"
timeout_seconds = 120
max_concurrent = 3

[agents]
ceo = { enabled = true, model = "default" }
orchestrator = { enabled = true, model = "default" }
architect = { enabled = true, model = "default" }
engineering = { enabled = true, model = "default" }
qa = { enabled = true, model = "default" }

[bus]
poll_interval = 2
queue_prefix = "bus/queue/"
