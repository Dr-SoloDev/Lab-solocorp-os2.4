context = """
ADR-003 กำหนด BusMessage schema และ routing protocol แล้ว แต่ยังไม่ระบุ implementation
Central Bus v0.6 ต้องบรรลุเป้าหมาย 5 ข้อ:

G1 — route messages ระหว่าง department agents ภายใน SLA
