# =============================================================================
# BODY — ENGLISH
# =============================================================================
[body.en]
summary = "Specify the v0.6 implementation of Central Bus Agent: a file-based, dependency-free message broker with 4-priority JSONL queues, Router Engine, State Store, Exception Handler, Audit Logger, and exponential-backoff retry — serving as the sole data-layer backbone for all 18 SoloCorp departments."

context = """
ADR-003 established the canonical BusMessage schema and routing protocol but left the
implementation unspecified. Central Bus v0.6 must fulfil five goals:

G1 — Route messages between department agents within SLA.
G2 — Track real-time state for every project (state.json always correct).
G3 — Detect and escalate CRITICAL exceptions within 30 seconds.
G4 — Maintain a complete, immutable audit trail keyed by trace_id.
G5 — Auto-retry failed messages up to 3 times with exponential backoff
     (≥ 80% retry-success rate).

Design constraints:
- Single operator (Dr.solodev) — zero external services allowed (no Redis, Kafka, RabbitMQ).
- All storage must be human-readable and git-trackable.
- Concurrent-write safety required; full ACID not required.
"""

decision = """
## Components

### Router Engine
- Reads message from queue; matches against routing_rules.json (3-tier: GOVERNANCE/AO
  passthrough → keyword → TF-IDF → CEO fallback).
- Unroutable messages raise UNROUTABLE exception; never silently dropped.

### State Store
- Reads/writes projects/{id}/state.json.
- Updates phase status on STATUS or ARTIFACT messages.
- Concurrent-write protection via optimistic locking on `updated_at`.

### Exception Handler
- Subscribes to EXCEPTION message type.
- Classifies severity: LOW / MED / HIGH / CRITICAL.
- CRITICAL triggers escalation chain → Telegram MCP alert < 30 s.

### Message Queue
- 4-priority JSONL queue files: critical.jsonl, high.jsonl, normal.jsonl, low.jsonl.
- Persistence: append-only; no external dependency.
- Retry: exponential backoff — 1 s, 5 s, 30 s.
- After 3 failed retries: move to dead_letter queue (never silently discard).

### Audit Logger
- Appends every event to projects/{id}/audit/{date}.jsonl.
- Immutable (append-only); trace_id present in every record.

## File Layout

    bus/
    ├── system/
    │   ├── routing_rules.json       ← Router Engine
    │   ├── monitor/{pipeline}.json  ← Watchdog health
    │   └── schedule/registry.json  ← Cron jobs
    ├── projects/{id}/
    │   ├── state.json               ← State Store
    │   ├── audit/{date}.jsonl       ← Audit Logger (append-only)
    │   └── artifacts/{phase}/       ← Phase outputs
    └── queue/
        ├── critical.jsonl
        ├── high.jsonl
        ├── normal.jsonl
        ├── low.jsonl
        └── dead_letter/

## Technology Choices

| Component     | Technology         | Rationale                           |
|---------------|--------------------|-------------------------------------|
| Queue storage | JSONL files        | No external service; simple         |
| State storage | JSON files         | Human-readable, git-trackable       |
| Locking       | flock (file lock)  | Prevents concurrent write           |
| Scheduling    | cron + Hermes      | Reuses existing infrastructure      |
| Alerts        | Telegram MCP       | Dr.solodev's existing channel       |

## Quality Gates (before shipping v0.6)

- Unit test coverage ≥ 80 %
- All 14 department routes validated by integration test
- Throughput ≥ 100 msg/min without queue overflow
- trace_id present in every audit event
- CRITICAL escalation latency < 30 s
- Dead-letter rate: 0 messages silently lost

## v0.6 Non-Goals (deferred)

- UI Dashboard → v0.7
- Multi-tenant isolation
- External webhook inbound
- Real-time streaming (polling only in v0.6)
"""

consequences = """
Positive:
- Zero external dependencies — runs on any machine with Python and a filesystem.
- Human-readable, git-trackable storage; easy to inspect and debug.
- Dead-letter queue ensures no message is silently lost.
- Immutable audit trail satisfies full trace_id coverage required by ADR-003.
- CRITICAL alert < 30 s satisfies Orchestrator SLA (MTTR ≤ 30 min).

Negative:
- File I/O limits throughput vs. in-memory broker; acceptable for current 14-agent scale.
- flock-based locking is not safe across NFS; acceptable for single-machine deployment.
- Dead-letter queue requires manual triage; no automated requeue in v0.6.

Risks and mitigations:
- File lock contention (Low/High) → optimistic lock + retry.
- Queue growth (Low/Med) → max queue size cap + dead-letter.
- State divergence (Med/High) → all writes must go through State Store exclusively.
- Routing rule errors (Med/Med) → dry-run mode before production apply.
"""

