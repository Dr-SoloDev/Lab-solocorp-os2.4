- ป้องกัน concurrent write; ไม่จำเป็นต้องการ ACID เต็มรูปแบบ
"""

decision = """
## Components

### Router Engine
- อ่าน message จาก queue; จับคู่กับ routing_rules.json (3 ชั้น: GOVERNANCE/AO passthrough
  → keyword → TF-IDF → CEO fallback)
- Messages ที่ route ไม่ได้จะสร้าง UNROUTABLE exception; ไม่เคยหายเงียบๆ

### State Store
- อ่าน/เขียน projects/{id}/state.json
- อัปเดต phase status เมื่อรับ STATUS หรือ ARTIFACT messages
- ป้องกัน concurrent write ด้วย optimistic locking บน `updated_at`

### Exception Handler
- Subscribe EXCEPTION message type
- จัดระดับ severity: LOW / MED / HIGH / CRITICAL
- CRITICAL trigger escalation chain → Telegram MCP alert ภายใน 30 วินาที

### Message Queue
- JSONL queue files 4 ระดับ: critical.jsonl, high.jsonl, normal.jsonl, low.jsonl
- Persistence: append-only; ไม่มี external dependency
- Retry: exponential backoff — 1 วินาที, 5 วินาที, 30 วินาที
- หลัง retry ล้มเหลว 3 ครั้ง: ย้ายไป dead_letter queue (ไม่มีการทิ้งเงียบๆ)

### Audit Logger
- append ทุก event ลง projects/{id}/audit/{date}.jsonl
- Immutable (append-only); ทุก record มี trace_id

## โครงสร้างไฟล์

    bus/
    ├── system/
    │   ├── routing_rules.json       ← Router Engine
    │   ├── monitor/{pipeline}.json  ← Watchdog health
    │   └── schedule/registry.json  ← Cron jobs
    ├── projects/{id}/
    │   ├── state.json               ← State Store
    │   ├── audit/{date}.jsonl       ← Audit Logger (append-only)
    │   └── artifacts/{phase}/       ← Phase outputs
    └── queue/
        ├── critical.jsonl
        ├── high.jsonl
        ├── normal.jsonl
        ├── low.jsonl
        └── dead_letter/

## การเลือก Technology

| Component     | Technology         | เหตุผล                              |
|---------------|--------------------|-------------------------------------|
| Queue storage | JSONL files        | ไม่ต้อง external service; เรียบง่าย |
| State storage | JSON files         | อ่านได้ง่าย, git-trackable          |
| Locking       | flock (file lock)  | ป้องกัน concurrent write            |
| Scheduling    | cron + Hermes      | ใช้ infrastructure ที่มีอยู่แล้ว   |
| Alerts        | Telegram MCP       | channel ของ Dr.solodev ที่ใช้อยู่   |

## Quality Gates (ก่อน ship v0.6)

- Unit test coverage ≥ 80%
- department routes ทั้ง 14 แผนกผ่าน integration test
- Throughput ≥ 100 msg/min โดยไม่ overflow
- ทุก audit event มี trace_id
- CRITICAL escalation latency < 30 วินาที
- Dead-letter rate: ไม่มี message หายเงียบๆ เลย

## สิ่งที่ไม่ทำใน v0.6 (เลื่อนไป)

- UI Dashboard → v0.7
- Multi-tenant isolation
- External webhook inbound
- Real-time streaming (v0.6 ใช้ polling เท่านั้น)
"""

consequences = """
ข้อดี:
- ไม่มี external dependencies — รันได้บนทุกเครื่องที่มี Python และ filesystem
- Storage อ่านได้โดยมนุษย์, git-trackable; debug ง่าย
- Dead-letter queue ทำให้ไม่มี message หายเงียบๆ
- Audit trail ไม่เปลี่ยนแปลงได้ ตอบสนองความต้องการ trace_id ครบของ ADR-003
- CRITICAL alert ภายใน 30 วินาที ตอบสนอง SLA ของ Orchestrator (MTTR ≤ 30 นาที)

ข้อเสีย:
- I/O ของไฟล์จำกัด throughput เมื่อเทียบกับ in-memory broker; ยอมรับได้สำหรับ 14 agents
- flock-based locking ไม่ปลอดภัยบน NFS; ยอมรับได้สำหรับ single-machine deployment
- Dead-letter queue ต้องมีคนมา triage เอง; ไม่มี automated requeue ใน v0.6

ความเสี่ยงและการลดความเสี่ยง:
- File lock contention (ต่ำ/สูง) → optimistic lock + retry
- Queue growth (ต่ำ/กลาง) → max queue size cap + dead-letter
- State divergence (กลาง/สูง) → ทุก write ต้องผ่าน State Store เท่านั้น
- Routing rule ผิด (กลาง/กลาง) → dry-run mode ก่อน production

ตัวเลือกที่ถูกปฏิเสธ:
- Redis — ปฏิเสธ: ต้อง external service; ซับซ้อนเกินสำหรับ single operator
- RabbitMQ / Kafka — ปฏิเสธ: over-engineered; operational overhead สูงเกิน
- SQLite queue — ปฏิเสธ: ซับซ้อนกว่า JSONL โดยไม่มีประโยชน์เพิ่ม
"""

