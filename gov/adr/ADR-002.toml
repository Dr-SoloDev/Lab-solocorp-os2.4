[metadata]
id = "ADR-002"
title = "Bilingual Documentation Policy — Thai + English"
status = "accepted"
author = "Product Manager (โปรดัค)"
date = "2026-07-05"
version = "1.0.0"

[classification]
domain = "documentation"
impact = "medium"
complexity = "low"
scope = "organization-wide"

context = """
SoloCorp OS operates with a bilingual team: Thai-speaking department heads and contributors who are most comfortable in Thai, alongside English-language technical documentation and external-facing materials. 

Previously, artifacts were written in whichever language the author chose, leading to inconsistency. Some non-Thai-speaking contributors could not review Thai-only ADRs, and some Thai-speaking stakeholders struggled with English-only RFCs.
"""

decision = """
All governance artifacts (ADRs, RFCs) MUST include both English (body.en) and Thai (body.th) sections with equivalent content. Each language section contains summary, context, decision/proposal, and consequences. The metadata and classification fields remain in English for machine parsing.

Exceptions:
- External-facing documentation may be English-only
- Internal working notes within departments may use either language
- Code comments remain in English
"""

consequences = """
**Positive:**
- All stakeholders can review artifacts in their preferred language
- External contributors can follow architectural decisions
- Machine parsing works on consistent English metadata

**Negative:**
- Authors must write equivalent content twice (increased effort)
- Risk of translation drift between language versions
- Longer file sizes for bilingual artifacts

**Mitigation:**
- Guard-002 (Bilingual Completeness) validates both sections exist
- Authors may write in one language and request translation
- Review process catches content discrepancies
"""

options = [
    "English-only — rejected: excludes Thai-speaking stakeholders",
    "Thai-only — rejected: excludes external contributors and machine parsing",
    "Bilingual EN+TH — accepted: maximum inclusivity",
    "Hybrid (metadata EN, body author's choice) — rejected: inconsistent review experience"
]

[footer]
references = ["gov/adr/ADR-001.toml"]
tags = ["documentation", "bilingual", "policy", "phase-0"]
review_date = "2026-10-05"
