เรามี `gov/` directory เป็น SSoT สำหรับ governance artifacts แล้ว แต่ยังขาดกลไก Threshold ที่สอดคล้องกันในการตัดสินว่า "การเปลี่ยนแปลงนี้ต้องใช้ RFC หรือ Full Review หรือแค่ ADR?"

RFC นี้เสนอ Complexity Matrix — คำถาม binary 3 ข้อ ที่รวมคะแนนแล้วกำหนด Governance Path:

  คะแนน 0   → Simple        → Direct ADR
  คะแนน 1   → Medium        → RFC (light review)
  คะแนน 2-3 → Complex       → Full Review

Orchestrator (Architect) เป็น decision-maker สำหรับ threshold routing ถ้าคะแนนอยู่ในขอบเขต (1) Orchestrator อาจ escalate ถ้าบริบทเหมาะสม
"""

proposal = """
## 3 คำถาม

แต่ละคำถามให้คะแนน 0 หรือ 1 ผลรวม (S + R + C) กำหนด Governance Path

### Q1 — ขอบเขตผลกระทบ (S — Scope Impact)
มีกี่ Department / Bounded Context ที่ได้รับผลกระทบ?

| เงื่อนไข | คะแนน | ตัวอย่าง |
|:----------|:------|:---------|
| ทีมเดียว / bounded context เดียว | **0** | การเปลี่ยน Backend API ภายใน Engineering |
| ข้ามทีม (2+ departments หรือ external API consumers) | **1** | การเปลี่ยน shared schema ที่ Engineering และ Product ใช้ร่วมกัน |

### Q2 — ความสามารถในการย้อนกลับ (R — Reversibility)
ยากหรือง่ายแค่ไหนที่จะย้อนกลับการตัดสินใจหลังจาก implement แล้ว?

| เงื่อนไข | คะแนน | ตัวอย่าง |
|:----------|:------|:---------|
| ย้อนกลับง่าย (code-only, ไม่มี data migration, ไม่มี commitments ภายนอก) | **0** | เพิ่ม optional field ใน internal config file |
| ย้อนกลับยากหรือมีต้นทุนสูง (data migration, breaking changes, ส่งผลถึง user, third-party contracts) | **1** | เปลี่ยน Central Bus JSON schema ที่ Agent 5 ตัวพึ่งพา |

### Q3 — ทรัพยากรที่ต้องใช้ (C — Resource Commitment)
องค์กรต้องใช้ทรัพยากรมากแค่ไหน?

| เงื่อนไข | คะแนน | ตัวอย่าง |
|:----------|:------|:---------|
| ใช้ทรัพยากรน้อย (< 1 sprint, ทำคนเดียวได้, หรือเป็น documentation ล้วนๆ) | **0** | อัปเดต README หรือเขียน ADR สำหรับ pattern ที่มีอยู่แล้ว |
| ใช้ทรัพยากรมาก (1+ sprints, หลายคน, มี external dependencies) | **1** | เพิ่ม Pipeline ใหม่ที่เกี่ยวข้อง 3 Departments |

## Decision Tree

```
                ┌─────────────────────────────────┐
                │  ตอบ Q1, Q2, Q3 (0 หรือ 1)      │
                │  รวมคะแนน = S + R + C            │
                └──────────┬──────────────────────┘
                           │
              ┌────────────┼────────────┐
              ▼            ▼            ▼
           รวม=0        รวม=1        รวม=2-3
              │            │            │
              ▼            ▼            ▼
        ┌──────────┐ ┌──────────┐ ┌──────────────┐
        │Direct ADR│ │   RFC    │ │ Full Review  │
        │ เบาๆ     │ │ Review   │ │ Review ลึก   │
        │ ไม่ต้อง  │ │ มาตรฐาน  │ │ + Stakeholder│
        │ RFC      │ │          │ │ + CEO ถ้า 3  │
        └──────────┘ └──────────┘ └──────────────┘
              │            │            │
              ▼            ▼            ▼
         สร้าง ADR     เขียน RFC     Full Review
         ใน gov/adr/   → 7 วัน       → Stakeholder
         ทันที         comment       presentations
                       period        → 14 วัน review
                                    → Orchestrator
                                      decision
```

### Threshold Escalation
ถ้า Orchestrator พิจารณาแล้วว่าบริบทสมควรให้ใช้ Path ที่สูงกว่า (เช่น การเปลี่ยนแปลงที่คะแนน 1 แต่แตะเส้นแบ่งทางการเมืองระหว่างแผนก) สามารถ escalate ได้หนึ่งระดับ พร้อม写明เหตุผลใน decision log

## ตัวอย่าง Scenario

| # | สถานการณ์ | S | R | C | รวม | Path | เหตุผล |
|:-:|:-----------|:-:|:-:|:-:|:---:|:-----|:--------|
| 1 | เพิ่ม optional field ใน ADR template (Engineering-only, ไม่มี migration, < 1 วัน) | 0 | 0 | 0 | **0** | Direct ADR | เปลี่ยน documentation ล้วนๆ |
| 2 | อัปเดต CMO profile SOUL.md เพิ่ม skills (ทีมเดียว, ย้อนกลับง่าย, < 1 sprint) | 0 | 0 | 0 | **0** | Direct ADR | ภายในทีม ไม่มี ripple effect |
| 3 | เพิ่ม Pipeline Agent ใหม่ในทีม Architect (แผนกเดียว แต่ต้อง integrate ปานกลาง) | 0 | 0 | 1 | **1** | RFC | Agent ใหม่มีผลต่อ routing tables และ handoff protocols |
| 4 | เปลี่ยนนโยบาย bilingual schema จากไทย-only เป็น ไทย+อังกฤษ (ไฟล์นโยบายเดียว แต่ย้อนกลับยากถ้า Agent ปรับตัวแล้ว) | 0 | 1 | 0 | **1** | RFC | Policy change มีผลต่อการเทรน Agent |
| 5 | ย้าย Central Bus จาก JSON → TOML (ข้าม department, schema migration, 2+ sprints) | 1 | 1 | 1 | **3** | Full Review | กระทบ 9 แผนก, ต้อง data migration, coordination สูง |
| 6 | เพิ่ม department ใหม่ (Data Science) เข้า SoloCorp OS (องค์กร-wide, ย้อนกลับยาก, 3+ sprints) | 1 | 1 | 1 | **3** | Full Review | โครงสร้างองค์กรใหม่, routing เปลี่ยน, งบประมาณ, CEO sign-off |
| 7 | เปลี่ยน routing.yaml ของ Orchestrator เพิ่ม trigger keywords (ทีมเดียว, ย้อนกลับง่าย, < 1 วัน) | 0 | 0 | 0 | **0** | Direct ADR | config update ไม่มี migration |
| 8 | Deprecate Pipeline ที่มีอยู่ซึ่ง 2 แผนกพึ่งพา (ข้ามทีม, ต้อง migration, effort ปานกลาง) | 1 | 1 | 1 | **3** | Full Review | Breaking change ที่มี downstream consumers |
"""

consequences = """
**ข้อดี:**
- กลไก Threshold ที่สอดคล้องและทำซ้ำได้ ช่วยลดความ ambiguity
- การเปลี่ยนแปลงที่มีความซับซ้อนต่ำยังคงรวดเร็ว (Direct ADR ในไม่กี่นาที)
- การเปลี่ยนแปลงที่ซับซ้อนได้รับการตรวจสอบอย่างเหมาะสม
- Orchestrator มีกรอบการทำงานที่ชัดเจน + อำนาจ escalation

**ข้อเสีย:**
- คำถาม binary อาจ oversimplify กรณี borderline (ลดด้วย escalation clause)
- Contributor ทุกคนต้องเรียนรู้ matrix (ลดด้วย RFC นี้ + examples)
- Orchestrator ต้องมีวินัย — ไม่ escalate ทุกอย่างเป็น Full Review

**ความเสี่ยง:**
- Matrix gaming — จงใจเพิ่ม/ลดคะแนน
  → ลดด้วย: ต้องมี rationale, มี review trail, สุ่ม audit
"""
alternatives = """
1. **Floating threshold** — ให้ Head แต่ละแผนกกำหนด path เอง
   → ❌ ไม่ consistent, ไม่มี visibility ในระดับองค์กร

2. **Always Full Review** — ทุกการเปลี่ยนแปลงผ่าน Full Cycle
   → ❌ ตายตอน trivial change

3. **Algorithmic scoring** — สูตรถ่วงน้ำหนัก 5+ ปัจจัย
   → ❌ ซับซ้อนเกินไป ไม่เหมาะกับ triage tool ที่ต้องเร็ว
"""

