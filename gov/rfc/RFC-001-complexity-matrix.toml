# =============================================================================
# RFC-001: Complexity Matrix for Governance Threshold
# =============================================================================
# English schema + Thai content — Hybrid Threshold Model
# Orchestrator (Architect) is the decision-maker for threshold routing.
# =============================================================================

[metadata]
id = "RFC-001"
title = "Complexity Matrix for Governance Threshold"
status = "accepted"
author = "Software Architect (พี่ทรงศักดิ์)"
date = "2026-07-05"
created = "2026-07-05"
version = "0.1.0"

[classification]
domain = "governance"
impact = "high"
complexity = "medium"
scope = "organization-wide"

# =============================================================================
# BODY — ENGLISH
# =============================================================================
[body.en]

summary = "Define a repeatable 3-question Complexity Matrix that determines which governance path a proposal must follow: Direct ADR, RFC, or Full Review."

context = """
SoloCorp OS is entering Phase 0: Governance Foundation. Historically, decisions were made ad-hoc — some changes that should have been lightweight ADRs went through heavy review, while complex cross-department changes slipped through without scrutiny.

The `gov/` directory is established as the SSoT for governance artifacts, but we lack a consistent threshold mechanism to decide: "Does this change need an RFC? A Full Review? Or can it go directly to an ADR?"

This RFC proposes a Complexity Matrix — three binary questions whose summed score gates the governance path:

  Score 0   → Simple        → Direct ADR
  Score 1   → Medium        → RFC (light review)
  Score 2-3 → Complex       → Full Review

The Orchestrator (Architect) is the designated decision-maker for threshold routing. If the score is borderline (1), the Orchestrator may escalate if context warrants.
"""

proposal = """
## The Three Questions

Each question is scored 0 or 1. The total (S + R + C) determines the governance path.

### Q1 — Scope Impact (S)
How many departments / bounded contexts are affected?

| Criterion | Score | Example |
|:----------|:------|:--------|
| Single team / single bounded context | **0** | Backend API change internal to Engineering |
| Cross-team (2+ departments or external API consumers) | **1** | Changing shared schema between Engineering & Product |

### Q2 — Reversibility (R)
How difficult / costly is it to reverse this decision once implemented?

| Criterion | Score | Example |
|:----------|:------|:--------|
| Easy to reverse (code-only, no data migration, no external commitments) | **0** | Adding a new optional field to an internal config file |
| Hard or costly to reverse (data migration, breaking changes, user-facing, third-party contracts) | **1** | Changing the Central Bus JSON schema that 5 agents depend on |

### Q3 — Resource Commitment (C)
How much organizational resource is required?

| Criterion | Score | Example |
|:----------|:------|:--------|
| Low effort (< 1 sprint, soloable, or purely documentation) | **0** | Updating a README or writing an ADR for an existing pattern |
| Significant effort (1+ sprints, multiple people, external dependencies) | **1** | Adding a new Pipeline that touches 3 departments |

## Decision Tree

```
                ┌─────────────────────────────┐
                │  Answer Q1, Q2, Q3 (0 or 1) │
                │  Total = S + R + C           │
                └──────────┬──────────────────┘
                           │
              ┌────────────┼────────────┐
              ▼            ▼            ▼
           Total=0      Total=1      Total=2-3
              │            │            │
              ▼            ▼            ▼
        ┌──────────┐ ┌──────────┐ ┌──────────────┐
        │Direct ADR│ │   RFC    │ │ Full Review  │
        │ Light-   │ │ Standard │ │ Deep Review  │
        │ weight   │ │ Review   │ │ + Stakeholder│
        │ No RFC   │ │ Cycle    │ │ + CEO if 3   │
        └──────────┘ └──────────┘ └──────────────┘
              │            │            │
              ▼            ▼            ▼
         Create ADR    Write RFC     Full Review
         direct in     → 7-day       → Stakeholder
         gov/adr/      comment       presentations
                       period        → 14-day review
                                    → Orchestrator
                                      decision
```

### Threshold Escalation
If the Orchestrator determines that context warrants a higher path (e.g., a score-1 change that touches a political boundary), they may escalate one level with a brief rationale in the decision log.

## Example Scenarios

| # | Scenario | S | R | C | Total | Path | Rationale |
|:-:|:---------|:-:|:-:|:-:|:-----:|:-----|:----------|
| 1 | Adding a new optional field to an internal ADR template (Engineering-only, no migration, < 1 day) | 0 | 0 | 0 | **0** | Direct ADR | Pure documentation change |
| 2 | Updating the CMO profile SOUL.md with new skills (Single team, easy to undo, < 1 sprint) | 0 | 0 | 0 | **0** | Direct ADR | Team-internal, no ripple effects |
| 3 | Adding a new Pipeline Agent to the Architect's team (Single department, but moderate effort to integrate) | 0 | 0 | 1 | **1** | RFC | New agent affects routing tables and handoff protocols |
| 4 | Changing the bilingual schema policy from Thai-only to Thai+English (Single policy file, but hard to reverse once agents adapt) | 0 | 1 | 0 | **1** | RFC | Policy change with downstream training implications |
| 5 | Migrating Central Bus from JSON to TOML (Cross-department, schema migration, 2+ sprints) | 1 | 1 | 1 | **3** | Full Review | Affects all 9 departments, requires data migration, high coordination cost |
| 6 | Introducing a new department (e.g., Data Science) into SoloCorp OS (Org-wide, irreversible restructuring, 3+ sprints) | 1 | 1 | 1 | **3** | Full Review | New org structure, routing changes, budget implications, CEO sign-off required |
| 7 | Changing the Orchestrator's routing.yaml to add new trigger keywords (Single team, easy to reverse, < 1 day) | 0 | 0 | 0 | **0** | Direct ADR | Config update, no migration |
| 8 | Deprecating an existing Pipeline that 2 departments depend on (Cross-team, migration needed, moderate effort) | 1 | 1 | 1 | **3** | Full Review | Breaking change with downstream consumers |
"""

consequences = """
**Positive:**
- Consistent, repeatable threshold mechanism removes ambiguity
- Low-complexity changes stay fast (Direct ADR in minutes)
- High-complexity changes get the scrutiny they deserve
- Orchestrator has clear framework + escalation authority

**Negative:**
- Binary questions may oversimplify borderline cases (mitigated by escalation clause)
- Requires all contributors to learn the matrix (mitigated by this RFC + examples)
- Orchestrator must stay disciplined — not escalate everything to Full Review

**Risk:**
- Matrix gaming — inflating/deflating scores intentionally
  → Mitigated by: rationale required, review trail, random audit
"""
alternatives = """
1. **Floating threshold** — Let each Department Head decide their own path
   → Rejected: inconsistent, no organization-wide visibility

2. **Always Full Review** — Every change through full cycle
   → Rejected: kills velocity for trivial changes

3. **Algorithmic scoring** — Weighted formula with 5+ factors
   → Rejected: too complex, defeats the purpose of a quick triage tool
"""

