# SoloCorp OS Routing Manifest — Head of Architect
# version: 2.1.0 — Behavior-Centric Routing (Add-on Layer)
#
# Changelog:
#   v2.1.0 — Added behavior taxonomy tasks (2026-07-20)
#   v2.0.0 — Pipeline-Based Routing

always_read:
  - README.md
  - profiles/INDEX.md
  - skills/solocorp/routing.yaml
  - rules/

tasks:
  # ── Pipeline Design (v2.0) ──────────────────────────────────────
  - id: pipeline-design
    label: ออกแบบ Pipeline Layout
    route: Architect — แตก Goal เป็น Pipeline Sequence
    trigger_examples:
      - pipeline
      - workflow
      - sequence
      - ขั้นตอน
    route_to: architect
    skills_hint: plan, handoff-templates

  - id: routing-config
    label: กำหนดเส้นทาง Pipeline
    route: Routing Config Agent — ตั้ง GNAP routing rules
    trigger_examples:
      - ตั้ง route
      - routing
      - เส้นทาง
      - ส่งต่อ
    route_to: architect
    skills_hint: team-routing-config

  - id: pipeline-audit
    label: ตรวจสอบ Integrity
    route: Pipeline Auditor — ตรวจสอบความถูกต้องหลัง handoff
    trigger_examples:
      - audit
      - ตรวจสอบ
      - verify
      - compliance
    route_to: architect
    skills_hint: team-pipeline-auditor

  - id: monitor-setup
    label: ตั้งค่าเฝ้าระวัง
    route: Monitor Watchdog — สร้าง health probe
    trigger_examples:
      - เฝ้า
      - monitor
      - ดูตลอด
      - watch
    route_to: architect
    skills_hint: team-monitor-watchdog

  - id: exception-triage
    label: จัดการข้อยกเว้น
    route: Exception Triage Agent — triage + auto-resolve
    trigger_examples:
      - error
      - exception
      - fail
      - crash
    route_to: architect
    skills_hint: team-exception-triage

  - id: cron-schedule
    label: ตั้งเวลา Pipeline
    route: Cron Pipeline Agent — schedule + retry
    trigger_examples:
      - cron
      - schedule
      - ประจำ
      - ทุกวัน
    route_to: architect
    skills_hint: team-cron-pipeline

  # ── Behavior Taxonomy (v2.1 — New) ──────────────────────────────
  - id: behavior-migration
    label: รัน Behavior Taxonomy Migration
    route: Architect — seed 26 behaviors + route map
    trigger_examples:
      - behavior migration
      - taxonomy seed
      - 26 behaviors
      - seed behaviors
    route_to: architect
    skills_hint: python, central_bus.behavior_migration

  - id: behavior-classifier
    label: Behavior Classification
    route: Architect — classify user intent before keyword routing
    trigger_examples:
      - behavior classify
      - intent routing
      - behavior match
      - classify intent
    route_to: architect
    skills_hint: ml, classifier, tfidf

  - id: behavior-config
    label: กำหนดค่า Behavior
    route: Routing Config Agent — ปรับ confidence threshold, routing logic
    trigger_examples:
      - ปรับ behavior
      - behavior config
      - threshold
      - routing logic
    route_to: architect
    skills_hint: team-routing-config

  - id: behavior-audit
    label: ตรวจสอบ Behavior Accuracy
    route: Pipeline Auditor — audit classification accuracy
    trigger_examples:
      - behavior audit
      - classification accuracy
      - misclassify
      - false positive
    route_to: architect
    skills_hint: team-pipeline-auditor
