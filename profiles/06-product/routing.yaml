# SoloCorp Routing Manifest — Product
# version: 2.0.0 — Added Behavior-Centric Routing tasks

tasks:
  - id: requirement
    label: เก็บ requirement / spec feature
    route: Product — user story, acceptance criteria
    trigger_examples:
      - requirement
      - feature spec
      - user story
      - PRD
    route_to: product
    skills_hint: plan, web-search

  - id: roadmap
    label: วางแผน roadmap
    route: Product — prioritization, timeline
    trigger_examples:
      - roadmap
      - priority
      - backlog
    route_to: product

  - id: user-research
    label: วิจัยผู้ใช้
    route: Product — interview, survey, feedback
    trigger_examples:
      - user research
      - customer feedback
      - survey
    route_to: product

  - id: competitive-analysis
    label: วิเคราะห์คู่แข่ง
    route: Product — competitor feature comparison
    trigger_examples:
      - competitor
      - คู่แข่ง
      - market analysis
    route_to: product
    skills_hint: niche-research, blogwatcher

  # ── Behavior-Centric Routing (new in v2.0) ──────────────────────

  - id: behavior-taxonomy
    label: กำหนดพฤติกรรม (Behavior Taxonomy)
    route: Product — define 26 behaviors + department mapping
    trigger_examples:
      - behavior taxonomy
      - behavior classification
      - user intent
      - พฤติกรรมผู้ใช้
      - intent classification
    route_to: product
    skills_hint: plan, ai-product-canvas

  - id: behavior-classifier-spec
    label: Spec ระบบ Behavior Classifier
    route: Product — PRD for classifier model, threshold, training data
    trigger_examples:
      - behavior classifier
      - confidence threshold
      - classifier spec
      - intent classifier
      - classifier model
    route_to: product
    skills_hint: ai-product-canvas, technical-spec-template

  - id: routing-metrics
    label: กำหนด success metrics สำหรับ routing
    route: Product — accuracy, false positive, CEO review volume
    trigger_examples:
      - routing accuracy
      - false positive rate
      - CEO review volume
      - behavior routing metrics
      - routing success metrics
    route_to: product
