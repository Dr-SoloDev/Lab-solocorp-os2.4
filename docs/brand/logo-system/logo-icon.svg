<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 64" fill="none">
  <!-- SoloCorp OS Icon — Hexagon Nexus Mark (Navy Enterprise) -->
  <defs>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
